# ===========================================
# 개발 환경 설정 (로컬 PostgreSQL + Redis)
# ===========================================
spring:
  # PostgreSQL 데이터소스
  datasource:
    url: jdbc:postgresql://localhost:5432/hair_db
    username: hair_user
    password: hair_pass
    driver-class-name: org.postgresql.Driver

  # JPA 설정
  jpa:
    hibernate:
      # update: 엔티티 변경 시 테이블 자동 수정 (개발용, 운영에서는 validate 사용)
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis 설정
  data:
    redis:
      host: localhost
      port: 6379

# 로깅 설정 (개발 환경에서는 DEBUG 레벨)
logging:
  level:
    com.mirae.hair: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
