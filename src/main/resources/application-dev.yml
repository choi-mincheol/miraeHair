# ===========================================
# 개발 환경 설정 (로컬 PostgreSQL + Redis)
# ===========================================
spring:
  # PostgreSQL 데이터소스
  datasource:
    url: jdbc:postgresql://localhost:5432/hair_db
    username: hair_user
    password: hair_pass
    driver-class-name: org.postgresql.Driver

  # JPA 설정
  jpa:
    hibernate:
      # update: 엔티티 변경 시 테이블 자동 수정 (개발용, 운영에서는 validate 사용)
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # Hibernate 6.x는 JDBC URL에서 dialect를 자동 감지하므로 별도 설정 불필요

  # Redis 설정
  data:
    redis:
      host: localhost
      port: 6379

# 로깅 설정 (개발 환경에서는 DEBUG 레벨)
logging:
  level:
    com.mirae.hair: DEBUG
    org.hibernate.SQL: DEBUG
    # Hibernate 6.x에서 바인딩 파라미터 로깅 (5.x의 BasicBinder에서 변경됨)
    org.hibernate.orm.jdbc.bind: TRACE
